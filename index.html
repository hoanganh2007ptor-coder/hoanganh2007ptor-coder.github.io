<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nạp Thẻ VIP</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f0f0f,#1c1c1c);
    color:white;
}

.header {
    background: linear-gradient(90deg,#ff5722,#ff9800);
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container {
    max-width:420px;
    margin:20px auto;
    background:#1e1e1e;
    padding:20px;
    border-radius:15px;
}

.card {
    background:#2a2a2a;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px orange;
}

.active {
    border:2px solid orange;
}

input, select {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button {
    width:100%;
    padding:14px;
    background:linear-gradient(90deg,#ff5722,#ff9800);
    border:none;
    color:white;
    border-radius:10px;
    font-size:16px;
}

.success {
    text-align:center;
    color:#4caf50;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
🔥 NẠP THẺ VIP FULL
</div>

<div class="container">

<h3>🎮 Nhập UID</h3>
<input type="text" id="uid" placeholder="Nhập UID Free Fire">

<h3>🛒 Chọn dịch vụ</h3>

<div class="card" onclick="chon(this,'💎 100 KC',20000)">💎 100 KC - 20.000đ</div>
<div class="card" onclick="chon(this,'💎 310 KC',50000)">💎 310 KC - 50.000đ</div>
<div class="card" onclick="chon(this,'📅 Thẻ tuần',20000)">📅 Thẻ tuần - 20.000đ</div>
<div class="card" onclick="chon(this,'📆 Thẻ tháng',100000)">📆 Thẻ tháng - 100.000đ</div>
<div class="card" onclick="chon(this,'🚀 Thẻ nâng cấp',150000)">🚀 Thẻ nâng cấp - 150.000đ</div>

<h3>💳 Nạp thẻ</h3>

<select id="telco">
<option>Viettel</option>
<option>Mobifone</option>
<option>Vinaphone</option>
</select>

<input type="text" id="code" placeholder="Nhập mã thẻ">
<input type="text" id="serial" placeholder="Nhập seri">

<button onclick="napthe()">Nạp ngay</button>

<div class="success" id="msg"></div>

</div>

<script>
let menhgia = 0;
let loai = "";

function chon(el, name, gia){
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    menhgia = gia;
    loai = name;
}

function napthe(){
    let uid = document.getElementById("uid").value;

    if(uid === ""){
        alert("Nhập UID!");
        return;
    }

    if(menhgia === 0){
        alert("Chọn dịch vụ!");
        return;
    }

    document.getElementById("msg").innerText =
        "✅ " + loai + " | UID: " + uid + " | Thành công (demo)";
}
</script>

</body>
</html>
