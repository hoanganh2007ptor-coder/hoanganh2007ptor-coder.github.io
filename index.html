<script>
let db = JSON.parse(localStorage.getItem("db")||"{}");
let current = localStorage.getItem("current")||"";

function save(){
    localStorage.setItem("db", JSON.stringify(db));
}

function update(){
    if(current && db[current]){
        document.getElementById("coin").innerText = db[current].coin;
        document.getElementById("info").innerText =
            "👤 "+current+" | UID: "+(db[current].uid||"");
    }
}

// đăng ký
function register(){
    let u = user.value;
    let p = pass.value;
    let id = uid.value;

    if(!u||!p||!id) return alert("Nhập đủ!");

    if(db[u]) return alert("Tồn tại!");

    db[u] = {pass:p, coin:0, uid:id, last:0};
    save();
    alert("Đăng ký OK");
}

// đăng nhập
function login(){
    let u = user.value;
    let p = pass.value;

    if(!db[u] || db[u].pass!=p){
        return alert("Sai!");
    }

    current = u;
    localStorage.setItem("current", u);
    update();
}

// nhiệm vụ
function task(){
    if(!current) return alert("Login!");

    let now = Date.now();
    if(now - db[current].last < 2000){
        return alert("Chậm lại!");
    }

    db[current].coin += 10;
    db[current].last = now;

    save();
    update();
}

// mua follow
function buy(){
    if(!current) return alert("Login!");

    if(db[current].coin < 50){
        return alert("Không đủ coin");
    }

    db[current].coin -= 50;

    save();
    update();

    kq.innerText = "🎉 Đã buff follow (demo)";
}

// nạp tiền
function nap(){
    if(!current) return alert("Login!");

    let money = parseInt(sotien.value);

    if(!money) return alert("Nhập tiền");

    db[current].coin += money * 100;

    save();
    update();

    alert("Nạp thành công (demo)");
}

update();
</script>
