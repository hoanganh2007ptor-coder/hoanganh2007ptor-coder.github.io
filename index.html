<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Web Tăng Follow</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
.box{
  background:#1e293b;
  margin:20px;
  padding:20px;
  border-radius:10px;
}
input{
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:none;
}
button{
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
.hidden{
  display:none;
}
</style>
</head>

<body>

<h1>🔥 Web Tăng Follow</h1>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>Đăng nhập</h3>
  <input id="user" placeholder="Tên tài khoản"><br>
  <input id="pass" type="password" placeholder="Mật khẩu"><br>
  <button onclick="login()">Đăng nhập</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="box">
    <h3>Xin chào: <span id="name"></span></h3>
    <p>💰 Điểm: <span id="coin">0</span></p>
  </div>

  <div class="box">
    <h3>Follow người này</h3>
    <p id="target">@user_demo</p>
    <button onclick="follow()">Đã follow</button>
  </div>

  <div class="box">
    <h3>👥 Danh sách user</h3>
    <ul id="users"></ul>
  </div>

</div>

<script>

// fake database
let accounts = [
  {user:"admin", pass:"123", coin:100},
  {user:"test", pass:"123", coin:50}
];

let current = null;

// login
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let acc = accounts.find(a => a.user === u && a.pass === p);

  if(acc){
    current = acc;
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("name").innerText = current.user;
    updateCoin();
    loadUsers();
  }else{
    alert("Sai tài khoản!");
  }
}

// cập nhật điểm
function updateCoin(){
  document.getElementById("coin").innerText = current.coin;
}

// follow
function follow(){
  current.coin += 10;
  updateCoin();
  alert("+10 điểm");
}

// load user
function loadUsers(){
  let list = document.getElementById("users");
  list.innerHTML = "";

  accounts.forEach(acc=>{
    let li = document.createElement("li");
    li.innerText = acc.user + " - 💰 " + acc.coin;
    list.appendChild(li);
  });
}

</script>

</body>
</html>
