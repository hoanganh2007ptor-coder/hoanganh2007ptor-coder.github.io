<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>🔥 App Kiếm Tiền</title>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;text-align:center}
.card{background:#1e293b;margin:10px;padding:20px;border-radius:15px}
input,button{padding:10px;margin:5px;border-radius:10px;border:none}
button{background:#22c55e;color:white}
</style>
</head>

<body>

<div id="login" class="card">
<h3>Đăng nhập</h3>
<input id="user" placeholder="User"><br>
<input id="pass" type="password" placeholder="Pass"><br>
<button onclick="login()">Login</button>
<button onclick="showReg()">Đăng ký</button>
</div>

<div id="register" class="card" style="display:none">
<h3>Đăng ký</h3>
<input id="ruser"><br>
<input id="rpass" type="password"><br>
<button onclick="register()">Tạo</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3 id="name"></h3>
<p>💰 Điểm: <span id="coin">0</span></p>
</div>

<div class="card">
<input id="money" placeholder="Nhập số tiền">
<button onclick="nap()">💳 Nạp tiền</button>
</div>

<div class="card">
<h3>👥 Danh sách user</h3>
<div id="list"></div>
</div>

</div>

<script>
let current=null;
const API="http://localhost:3000";

async function register(){
  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user:ruser.value,
      pass:rpass.value
    })
  });
  alert("Đăng ký xong!");
}

async function login(){
  let res=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user:user.value,
      pass:pass.value
    })
  });

  let data=await res.json();
  if(!data.ok) return alert("Sai tài khoản");

  current=data.user;

  login.style.display="none";
  app.style.display="block";

  name.innerText=current.user;
  coin.innerText=current.coin;

  loadUsers();
}

async function loadUsers(){
  let res=await fetch(API+"/users");
  let data=await res.json();

  list.innerHTML="";
  data.forEach(u=>{
    list.innerHTML+=`<div>${u.user} - 💰 ${u.coin}</div>`;
  });
}

async function nap(){
  let amount=parseInt(money.value);

  let res=await fetch(API+"/create-payment",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user:current.user,
      amount:amount
    })
  });

  let data=await res.json();

  window.location.href=data.checkoutUrl;
}

function showReg(){
  register.style.display="block";
}
</script>

</body>
</html>
