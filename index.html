<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Nạp Thẻ Nhanh</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
}

/* HEADER */
.header {
    background:#ff5722;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* BOX */
.container {
    max-width:400px;
    margin:30px auto;
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
}

h2 {
    text-align:center;
}

/* INPUT */
select, input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

/* BUTTON */
button {
    width:100%;
    padding:12px;
    background:#ff5722;
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
}

/* CARD GÓI */
.card {
    background:#222;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
🔥 NẠP THẺ TỰ ĐỘNG
</div>

<div class="container">

<h2>Chọn mệnh giá</h2>

<div class="card">100 Kim Cương - 20.000đ</div>
<div class="card">310 Kim Cương - 50.000đ</div>
<div class="card">520 Kim Cương - 100.000đ</div>

<h2>Nạp thẻ</h2>

<select>
<option>Viettel</option>
<option>Mobifone</option>
<option>Vinaphone</option>
</select>

<input type="text" placeholder="Nhập mã thẻ">
<input type="text" placeholder="Nhập seri">

<button onclick="napthe()">Nạp ngay</button>

</div>

<script>
function napthe(){
    alert("Nạp thẻ thành công (demo)");
}
</script>

</body>
</html>
