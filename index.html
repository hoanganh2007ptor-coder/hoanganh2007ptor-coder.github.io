<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tăng Follow</title>
<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
.box{
  background:#1e293b;
  margin:20px;
  padding:20px;
  border-radius:10px;
}
button{
  background:#22c55e;
  border:none;
  padding:10px 20px;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🔥 Web Tăng Follow</h1>

<div class="box">
  <h3>Follow người này</h3>
  <p>@username123</p>
  <button onclick="follow()">Đã follow</button>
</div>

<div class="box">
  <h3>Điểm của bạn</h3>
  <p id="coin">0</p>
</div>

<script>
let coin = 0;

function follow(){
  coin += 10;
  document.getElementById("coin").innerText = coin;
  alert("+10 điểm!");
}
</script>

</body>
</html>
