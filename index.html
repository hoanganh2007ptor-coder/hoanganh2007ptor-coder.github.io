<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ShopHandhz</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #ff5722;
            color: white;
            border-radius: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Shop Nạp Kim Cương 💎</h1>
        <p>Uy tín - Nhanh - Giá rẻ</p>
        <button>Mua ngay</button>
    </div>
</body>
</html>
