<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>🔥 Web Kiếm Tiền</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000, #111, #222);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 80px;
      font-size: 30px;
    }

    p {
      opacity: 0.7;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #ff3c00;
      color: white;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff6a00;
      transform: scale(1.1);
    }

    /* loading */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      z-index: 999;
    }

    /* hiệu ứng glow */
    .glow {
      color: #fff;
      text-shadow: 0 0 10px #ff3c00, 0 0 20px #ff3c00;
    }
  </style>
</head>

<body>

<div id="loading">⚡ Đang tải hệ thống...</div>

<h1 class="glow">🔥 Web Kiếm Tiền</h1>
<p>Chào mừng bạn đến web của Hoàng Anh</p>

<button onclick="batdau()">Bắt đầu</button>

<script>
  // loading biến mất
  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
  }, 2000);

  function batdau() {
    alert("🚀 Bắt đầu kiếm tiền thôi!");
  }
</script>

</body>
</html>
