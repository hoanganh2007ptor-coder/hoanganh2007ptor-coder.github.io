<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Web Buff Follow</title>
<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}
.box{
  background:#222;
  padding:20px;
  margin:15px;
  border-radius:10px;
}
input,button{
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:none;
}
button{
  background:orange;
  color:white;
}
</style>
</head>
<body>
<h2>🔥 Web Buff Follow 🔥</h2>
<div class="box">
<h3>👤 Nhập UID</h3>
<input id="uid" placeholder="Nhập UID">
</div>
<div class="box">
<h3>💰 Coin: <span id="coin">0</span></h3>
<button onclick="nap()">+ Nạp tiền (demo)</button>
</div>
<div class="box">
<h3>🚀 Buff Follow</h3>
<button onclick="buff()">Buff +100 follow (50 coin)</button>
<p id="kq"></p>
</div>
<div class="box">
<h3>💳 Nạp tiền thật</h3>
<p>Ngân hàng: MB Bank</p>
<p>STK: 567551234</p>
<p>Tên: NGUYEN HOANG ANH</p>
<p>Nội dung: nap tenban</p>
<button onclick="alert('Chuyển xong thì inbox admin!')">
Tôi đã chuyển
</button>
</div>
<script>
let coin = 0;
function nap(){
  coin += 100;
  document.getElementById("coin").innerText = coin;
}
function buff(){
  if(coin < 50){
    kq.innerText = "Không đủ coin!";
    return;
  }
  coin -= 50;
  document.getElementById("coin").innerText = coin;
  let uid = document.getElementById("uid").value;
  // 🔥 GỌI API BUFF (thay bằng API của bạn)
  fetch("https://api.buff.com?uid="+uid)
  .then(()=>kq.innerText="Buff thành công!")
  .catch(()=>kq.innerText="Lỗi API");
}
</script>
</body>
</html>html>
